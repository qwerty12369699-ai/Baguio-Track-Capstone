<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baguio Track | Sign In</title>
  <link rel="stylesheet" href="../assets/css/modern.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }

    .auth-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1);
      padding: 56px 40px;
      max-width: 440px;
      width: 100%;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-logo {
      font-size: 48px;
      color: #2563eb;
      margin-bottom: 16px;
    }

    .auth-header h1 {
      font-size: 32px;
      font-weight: 800;
      color: #1a1a1a;
      margin: 0 0 8px;
      letter-spacing: -0.5px;
    }

    .auth-header p {
      font-size: 15px;
      color: #6b7280;
      margin: 0;
      line-height: 1.6;
    }

    .auth-options {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .auth-btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }

    .auth-btn-primary {
      background: #2563eb;
      color: white;
      box-shadow: 0 4px 6px rgba(37, 99, 235, 0.3);
    }

    .auth-btn-primary:hover {
      background: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 8px 12px rgba(37, 99, 235, 0.4);
    }

    .auth-btn-secondary {
      background: white;
      color: #1a1a1a;
      border: 1.5px solid #e5e7eb;
    }

    .auth-btn-secondary:hover {
      background: #f9fafb;
      border-color: #2563eb;
      color: #2563eb;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: #9ca3af;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .divider-text {
      font-size: 13px;
      font-weight: 600;
    }

    .auth-footer {
      text-align: center;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
      font-size: 13px;
      color: #6b7280;
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 40px 24px;
      }

      .auth-header h1 {
        font-size: 28px;
      }

      .auth-btn {
        padding: 12px 16px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-map-location-dot"></i></div>
      <h1>Baguio Track</h1>
      <p>Discover the City of Pines. Sign in to start exploring.</p>
    </div>

    <form id="authForm">
      <div class="auth-options">
        <button type="button" class="auth-btn auth-btn-primary" id="googleSignUpBtn">
          <i class="fab fa-google"></i> Continue with Google
        </button>

        <div class="divider">
          <span class="divider-text">or</span>
        </div>

        <a href="adminlogin.html" class="auth-btn auth-btn-secondary">
          <i class="fas fa-lock"></i> Sign In as Admin
        </a>
      </div>
    </form>

    <div class="auth-footer">
      <p>By continuing, you agree to our Terms of Service and Privacy Policy</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDPFnyJC66A-HQC3dKCQQ4SobAFRezx7fU",
      authDomain: "baguio-track-c702f.firebaseapp.com",
      projectId: "baguio-track-c702f",
      storageBucket: "baguio-track-c702f.firebasestorage.app",
      messagingSenderId: "27598181344",
      appId: "1:27598181344:web:97bf7dd2a32dbfe14ed185"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("googleSignUpBtn").addEventListener("click", async (e) => {
      e.preventDefault();
      try {
        const provider = new GoogleAuthProvider();
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        const regCount = parseInt(localStorage.getItem("registeredUsers") || "0");
        localStorage.setItem("registeredUsers", regCount + 1);

        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("userEmail", user.email);

        if (user.displayName) {
          localStorage.setItem("baguioTrackUserName", user.displayName);
        }

        if (user.photoURL) {
          localStorage.setItem("baguioTrackProfileImage", user.photoURL);
        }

        if (!localStorage.getItem("userCreatedDate")) {
          localStorage.setItem("userCreatedDate", new Date().toLocaleDateString());
        }

        window.location.href = "home.html";
      } catch (error) {
        alert("❌ " + error.message);
      }
    });
  </script>

</body>
</html>
